name: Markdown

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Markdown and Skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate Markdown links and Skill frontmatter
        run: python scripts/validate_markdown.py
